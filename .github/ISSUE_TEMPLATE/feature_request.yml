name: Feature Request
description: Suggest an improvement or new feature for OpenAffiliate.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: checkboxes
    attributes:
      label: Before you submit
      options:
        - label: I have searched existing issues and this feature has not been requested before
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear and concise description of the problem or limitation you're facing.
      placeholder: I wish I could...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Desired solution
      description: What would you like to see? How should it work?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you have tried or thought about?
    validations:
      required: false
