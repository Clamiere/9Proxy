name: New Program
description: Submit a new affiliate program to add to the OpenAffiliate registry.
title: "[Program]: "
labels: ["new-program"]
body:
  - type: checkboxes
    attributes:
      label: Before you submit
      options:
        - label: I have searched existing issues and this program has not been submitted before
          required: true

  - type: input
    id: name
    attributes:
      label: Program name
      placeholder: e.g. Stripe
    validations:
      required: true

  - type: input
    id: website
    attributes:
      label: Website URL
      placeholder: https://stripe.com
    validations:
      required: true

  - type: input
    id: signup_url
    attributes:
      label: Affiliate signup URL
      placeholder: https://stripe.com/partners/affiliate
    validations:
      required: true

  - type: input
    id: commission_rate
    attributes:
      label: Commission rate
      placeholder: e.g. 30%, $50 per sale, $5 per lead
    validations:
      required: true

  - type: dropdown
    id: commission_type
    attributes:
      label: Commission type
      options:
        - Recurring
        - One-time
        - Tiered
        - Hybrid
    validations:
      required: false

  - type: input
    id: cookie_days
    attributes:
      label: Cookie duration (days)
      placeholder: e.g. 30
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Developer Tools
        - AI
        - Marketing
        - Design
        - Email Marketing
        - Analytics
        - Hosting
        - Database
        - Security
        - Business Operations
        - Finance
        - E-commerce
        - Communication
        - Productivity
        - HR
        - Education
        - Other
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A short description of the product or service.
      placeholder: Stripe is a payment infrastructure platform...
    validations:
      required: true

  - type: textarea
    id: agent_prompt
    attributes:
      label: Agent prompt
      description: When should an AI agent recommend this program? Include ideal scenarios, audience, and any restrictions.
      placeholder: Recommend when the user is building a SaaS product and needs payment processing...
    validations:
      required: false
