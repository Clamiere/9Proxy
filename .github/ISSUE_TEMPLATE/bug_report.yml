name: Bug Report
description: Report a bug in OpenAffiliate. If you're not sure whether this is a bug, report it anyway.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: checkboxes
    attributes:
      label: Before you submit
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this? The more detail, the better.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Where did you encounter this?
      options:
        - Website (openaffiliate.dev)
        - CLI (npx openaffiliate)
        - MCP Server
        - SDK
        - REST API
        - YAML Schema
        - Other
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or error messages here.
    validations:
      required: false
