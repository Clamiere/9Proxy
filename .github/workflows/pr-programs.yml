name: Program PR

on:
  pull_request:
    paths:
      - "programs/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  enrich:
    name: Validate, Enrich & Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # ‚îÄ‚îÄ Step 1: Identify changed program files ‚îÄ‚îÄ
      - name: List changed programs
        id: changed
        run: |
          # New files (added in PR)
          NEW_FILES=$(git diff --name-only --diff-filter=A origin/main...HEAD -- programs/ | grep '\.yaml$' || true)
          # Modified files (updated in PR)
          MOD_FILES=$(git diff --name-only --diff-filter=M origin/main...HEAD -- programs/ | grep '\.yaml$' || true)
          # All changed
          ALL_FILES=$(git diff --name-only origin/main...HEAD -- programs/ | grep '\.yaml$' || true)

          echo "new_files<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "mod_files<<EOF" >> $GITHUB_OUTPUT
          echo "$MOD_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "all_files<<EOF" >> $GITHUB_OUTPUT
          echo "$ALL_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          NEW_COUNT=$(echo "$NEW_FILES" | grep -c . || echo 0)
          MOD_COUNT=$(echo "$MOD_FILES" | grep -c . || echo 0)
          ALL_COUNT=$(echo "$ALL_FILES" | grep -c . || echo 0)
          echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
          echo "mod_count=$MOD_COUNT" >> $GITHUB_OUTPUT
          echo "count=$ALL_COUNT" >> $GITHUB_OUTPUT

          # Determine PR type
          if [ "$NEW_COUNT" -gt 0 ] && [ "$MOD_COUNT" -eq 0 ]; then
            echo "pr_type=new" >> $GITHUB_OUTPUT
          elif [ "$MOD_COUNT" -gt 0 ] && [ "$NEW_COUNT" -eq 0 ]; then
            echo "pr_type=update" >> $GITHUB_OUTPUT
          else
            echo "pr_type=mixed" >> $GITHUB_OUTPUT
          fi

          SLUGS=$(echo "$ALL_FILES" | sed 's|programs/||;s|\.yaml||' | tr '\n' ', ' | sed 's/,$//')
          echo "slugs=$SLUGS" >> $GITHUB_OUTPUT

      # ‚îÄ‚îÄ Step 1b: Build registry index from main (for dedup check on new files) ‚îÄ‚îÄ
      - name: Build dedup index from main
        if: steps.changed.outputs.count > 0
        run: |
          git stash
          npx tsx scripts/build-registry.ts 2>/dev/null || true
          git stash pop || true

      # ‚îÄ‚îÄ Step 2: Validate YAML schema ‚îÄ‚îÄ
      - name: Validate YAML schema
        id: validate
        if: steps.changed.outputs.count > 0
        continue-on-error: true
        run: npx tsx scripts/build-registry.ts 2>&1 | tee /tmp/validate.log

      # ‚îÄ‚îÄ Step 3: Verify signup URLs ‚îÄ‚îÄ
      - name: Verify URLs
        id: verify
        if: steps.changed.outputs.count > 0
        continue-on-error: true
        run: |
          SLUGS="${{ steps.changed.outputs.slugs }}"
          for slug in $(echo "$SLUGS" | tr ',' ' '); do
            npx tsx scripts/verify-programs.ts "$slug" 2>&1 || true
          done | tee /tmp/verify.log

      # ‚îÄ‚îÄ Step 4: Auto-enrich new programs (skip dedup for updates) ‚îÄ‚îÄ
      - name: Enrich programs
        id: enrich
        if: steps.changed.outputs.count > 0
        run: |
          FILES="${{ steps.changed.outputs.all_files }}"
          for f in $FILES; do
            if [ -f "$f" ]; then
              npx tsx scripts/enrich-program.ts "$f" 2>&1 || true
            fi
          done | tee /tmp/enrich.log

      # ‚îÄ‚îÄ Step 4b: Diff changes for updates ‚îÄ‚îÄ
      - name: Generate update diff
        id: diff
        if: steps.changed.outputs.mod_count > 0
        run: |
          DIFF=$(git diff origin/main...HEAD -- programs/ | head -200)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ‚îÄ‚îÄ Step 5: Commit enrichment changes back to PR ‚îÄ‚îÄ
      - name: Commit enrichments
        id: commit
        if: steps.changed.outputs.count > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add programs/ public/logos/
          if git diff --cached --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: auto-enrich program submission

          Auto-applied by CI:
          - Fix commission.rate format (number ‚Üí string)
          - Add missing defaults (kind, source, last_verified_at)
          - Download logo

          Co-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      # ‚îÄ‚îÄ Step 6: Add label ‚îÄ‚îÄ
      - name: Add label
        uses: actions/github-script@v7
        with:
          script: |
            const prType = '${{ steps.changed.outputs.pr_type }}';
            const labels = prType === 'update' ? ['program-update'] : ['new-program'];
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels
            });

      # ‚îÄ‚îÄ Step 7: Post review comment ‚îÄ‚îÄ
      - name: Post review comment
        id: review
        if: steps.changed.outputs.count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = await import('fs');

            const newFiles = `${{ steps.changed.outputs.new_files }}`.trim().split('\n').filter(Boolean);
            const modFiles = `${{ steps.changed.outputs.mod_files }}`.trim().split('\n').filter(Boolean);
            const prType = '${{ steps.changed.outputs.pr_type }}';
            const validateOk = '${{ steps.validate.outcome }}' === 'success';
            const verifyOk = '${{ steps.verify.outcome }}' === 'success';
            const committed = '${{ steps.commit.outputs.committed }}' === 'true';

            let enrichResults = [];
            try {
              enrichResults = JSON.parse(fs.readFileSync('enrichment-result.json', 'utf-8'));
            } catch {}

            let body = '';

            // ‚îÄ‚îÄ Header based on PR type ‚îÄ‚îÄ
            if (prType === 'update') {
              const slugs = modFiles.map(f => f.replace('programs/', '').replace('.yaml', ''));
              body += `### Program Update Review\n\n`;
              body += `Updating ${modFiles.length} program(s): ${slugs.map(s => `**${s}**`).join(', ')}\n\n`;
            } else if (prType === 'new') {
              body += `### New Program Submission\n\n`;
              body += `${newFiles.length} program(s): ${newFiles.map(f => `\`${f}\``).join(', ')}\n\n`;
            } else {
              body += `### Program Submission (New + Update)\n\n`;
              if (newFiles.length) body += `New: ${newFiles.map(f => `\`${f}\``).join(', ')}\n`;
              if (modFiles.length) body += `Updated: ${modFiles.map(f => `\`${f}\``).join(', ')}\n\n`;
            }

            // ‚îÄ‚îÄ Dedup (only for new files) ‚îÄ‚îÄ
            const duplicates = enrichResults.filter(r => r.duplicate);
            if (duplicates.length > 0) {
              body += `#### Duplicate Detected\n\n`;
              for (const r of duplicates) {
                const d = r.duplicate;
                if (d.match_type === 'fuzzy') {
                  body += `> **${r.slug}** looks similar to existing program **${d.matched_slug}** (fuzzy match, distance: ${d.distance}).\n`;
                  body += `> Please confirm this is a different program, or update the existing file instead.\n\n`;
                } else {
                  body += `> **${r.slug}** already exists in the registry (matched by ${d.match_type} ‚Üí **${d.matched_slug}**).\n`;
                  body += `> To update this program, modify \`programs/${d.matched_slug}.yaml\` instead of creating a new file.\n\n`;
                }
              }
            }

            // ‚îÄ‚îÄ Update diff summary ‚îÄ‚îÄ
            if (prType === 'update' || prType === 'mixed') {
              body += `#### Changes\n`;
              body += `<details><summary>View diff</summary>\n\n`;
              body += '```diff\n';
              body += `${{ steps.diff.outputs.diff }}`.substring(0, 3000) || '(no diff available)';
              body += '\n```\n</details>\n\n';
            }

            // ‚îÄ‚îÄ Checklist ‚îÄ‚îÄ
            const dedupOk = duplicates.length === 0;
            body += `#### Automated Checks\n`;
            if (prType !== 'update') {
              body += `- [${dedupOk ? 'x' : ' '}] Dedup check${!dedupOk ? ' **BLOCKED**' : ''}\n`;
            }
            body += `- [${validateOk ? 'x' : ' '}] YAML schema validation\n`;
            body += `- [${verifyOk ? 'x' : ' '}] Signup URL verification\n`;
            body += `- [ ] Data accuracy (manual)\n\n`;

            // ‚îÄ‚îÄ Enrichment ‚îÄ‚îÄ
            const enriched = enrichResults.filter(r => r.changes.length > 0 || r.errors.length > 0);
            if (enriched.length > 0) {
              body += `#### Auto-Enrichment\n`;
              for (const r of enrichResults) {
                if (r.changes.length > 0) {
                  body += `**${r.slug}**: ${r.changes.join(', ')}\n`;
                }
                if (r.errors.length > 0 && !r.duplicate) {
                  body += `**${r.slug}** needs fix: ${r.errors.join(', ')}\n`;
                }
              }
              body += '\n';
            }

            if (committed) {
              body += `> Auto-enrichment changes have been committed to this PR.\n\n`;
            }

            // ‚îÄ‚îÄ Determine auto-merge eligibility ‚îÄ‚îÄ
            const hasErrors = enrichResults.some(r => r.errors.length > 0);
            const canAutoMerge = validateOk && verifyOk && dedupOk && !hasErrors;

            if (canAutoMerge) {
              body += `All automated checks passed. This PR is eligible for auto-merge.\n\n`;
            }

            body += `---\nThanks for contributing to OpenAffiliate!`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            // Output merge eligibility
            core.setOutput('can_auto_merge', canAutoMerge ? 'true' : 'false');

      # ‚îÄ‚îÄ Step 8: Auto-merge if all checks pass ‚îÄ‚îÄ
      - name: Auto-merge
        if: steps.review.outputs.can_auto_merge == 'true'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --subject "feat: add/update $(echo '${{ steps.changed.outputs.slugs }}' | tr ',' ' + ') program(s)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ‚îÄ‚îÄ Step 9: Rebuild registry after merge ‚îÄ‚îÄ
      - name: Rebuild registry
        if: steps.review.outputs.can_auto_merge == 'true'
        run: |
          npx tsx scripts/build-registry.ts
          git add src/lib/registry.json src/lib/registry-index.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: rebuild registry

          Co-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
            git push
          fi
