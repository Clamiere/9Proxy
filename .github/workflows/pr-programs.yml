name: Program PR

on:
  pull_request:
    paths:
      - "programs/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  enrich:
    name: Validate, Enrich & Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # ── Step 1: Identify changed program files ──
      - name: List changed programs
        id: changed
        run: |
          FILES=$(git diff --name-only origin/main...HEAD -- programs/ | grep '\.yaml$' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          COUNT=$(echo "$FILES" | grep -c . || echo 0)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          # Extract slugs for display
          SLUGS=$(echo "$FILES" | sed 's|programs/||;s|\.yaml||' | tr '\n' ', ' | sed 's/,$//')
          echo "slugs=$SLUGS" >> $GITHUB_OUTPUT

      # ── Step 2: Validate YAML schema ──
      - name: Validate YAML schema
        id: validate
        if: steps.changed.outputs.count > 0
        continue-on-error: true
        run: npx tsx scripts/build-registry.ts 2>&1 | tee /tmp/validate.log

      # ── Step 3: Verify signup URLs ──
      - name: Verify URLs
        id: verify
        if: steps.changed.outputs.count > 0
        continue-on-error: true
        run: |
          SLUGS="${{ steps.changed.outputs.slugs }}"
          for slug in $(echo "$SLUGS" | tr ',' ' '); do
            npx tsx scripts/verify-programs.ts "$slug" 2>&1 || true
          done | tee /tmp/verify.log

      # ── Step 4: Auto-enrich (fix rate format, add defaults, download logo) ──
      - name: Enrich programs
        id: enrich
        if: steps.changed.outputs.count > 0
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          for f in $FILES; do
            if [ -f "$f" ]; then
              npx tsx scripts/enrich-program.ts "$f" 2>&1 || true
            fi
          done | tee /tmp/enrich.log

      # ── Step 5: Commit enrichment changes back to PR ──
      - name: Commit enrichments
        id: commit
        if: steps.changed.outputs.count > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Check if there are changes to commit
          git add programs/ public/logos/
          if git diff --cached --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
            echo "No enrichment changes to commit."
          else
            CHANGES=$(git diff --cached --stat | tail -1)
            git commit -m "chore: auto-enrich program submission

            Auto-applied by CI:
            - Fix commission.rate format (number → string)
            - Add missing defaults (kind, source, last_verified_at)
            - Download logo

            Co-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
            echo "changes=$CHANGES" >> $GITHUB_OUTPUT
          fi

      # ── Step 6: Add label ──
      - name: Add label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['new-program']
            });

      # ── Step 7: Post review comment ──
      - name: Post review comment
        if: steps.changed.outputs.count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = await import('fs');

            const files = `${{ steps.changed.outputs.files }}`.trim().split('\n').filter(Boolean);
            const slugs = `${{ steps.changed.outputs.slugs }}`;
            const validateOk = '${{ steps.validate.outcome }}' === 'success';
            const verifyOk = '${{ steps.verify.outcome }}' === 'success';
            const committed = '${{ steps.commit.outputs.committed }}' === 'true';

            // Read enrichment results if available
            let enrichResults = [];
            try {
              enrichResults = JSON.parse(fs.readFileSync('enrichment-result.json', 'utf-8'));
            } catch {}

            const list = files.map(f => `\`${f}\``).join(', ');

            let body = `### Program Submission Review\n\n`;
            body += `**${files.length} program(s):** ${list}\n\n`;

            // Checklist
            body += `#### Automated Checks\n`;
            body += `- [${validateOk ? 'x' : ' '}] YAML schema validation\n`;
            body += `- [${verifyOk ? 'x' : ' '}] Signup URL verification\n`;
            body += `- [ ] Commission data accuracy (manual)\n`;
            body += `- [ ] Agent prompt quality (manual)\n\n`;

            // Enrichment details
            if (enrichResults.length > 0) {
              body += `#### Auto-Enrichment\n`;
              for (const r of enrichResults) {
                if (r.changes.length > 0) {
                  body += `**${r.slug}** — ${r.changes.length} fix(es) applied automatically:\n`;
                  for (const c of r.changes) {
                    body += `- ✅ ${c}\n`;
                  }
                }
                if (r.errors.length > 0) {
                  body += `**${r.slug}** — ⚠️ needs manual fix:\n`;
                  for (const e of r.errors) {
                    body += `- ❌ ${e}\n`;
                  }
                }
                if (r.changes.length === 0 && r.errors.length === 0) {
                  body += `**${r.slug}** — ✅ no issues found\n`;
                }
              }
              body += '\n';
            }

            if (committed) {
              body += `> 💡 Auto-enrichment changes have been committed to this PR.\n\n`;
            }

            body += `---\nThanks for contributing to OpenAffiliate! A maintainer will review shortly.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
