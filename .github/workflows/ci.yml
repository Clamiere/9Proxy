name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  validate-programs:
    name: Validate Programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate YAML files
        run: |
          npm install -g yaml
          for file in programs/*.yaml; do
            echo "Validating $file..."
            node -e "
              const fs = require('fs');
              const { parse } = require('yaml');
              const content = fs.readFileSync('$file', 'utf8');
              const data = parse(content);
              const required = ['name', 'slug', 'url', 'category', 'commission', 'description', 'agents'];
              const missing = required.filter(f => !data[f]);
              if (missing.length) {
                console.error('Missing required fields:', missing.join(', '));
                process.exit(1);
              }
              const filename = '$file'.split('/').pop().replace('.yaml', '');
              if (data.slug !== filename) {
                console.error('Slug mismatch: slug=' + data.slug + ' filename=' + filename);
                process.exit(1);
              }
              console.log('  OK');
            "
          done
