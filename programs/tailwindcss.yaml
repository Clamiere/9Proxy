description: >
  Tailwind UI is the official premium component library built by the creators of Tailwind CSS.
  It provides hundreds of beautifully designed, ready-to-use HTML and React/Vue components
  built with Tailwind CSS. Products include component packs for marketing sites and application
  UI, plus full starter templates for Next.js, React, and Vue.

  Earn a one-time 20% commission on Tailwind UI purchases. The All Access package (which
  gives lifetime access to all components and templates) is a popular high-value purchase
  that converts well with developer audiences. Note: the commission is on Tailwind UI
  products, not the free Tailwind CSS framework.

short_description: "Premium UI components and templates built with Tailwind CSS"

