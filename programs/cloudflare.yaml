description: >
  Cloudflare is one of the world's largest networks, protecting and accelerating millions
  of websites, APIs, and applications. Its products include CDN, DDoS mitigation, DNS,
  Zero Trust security, Workers (edge compute), Pages (JAMstack hosting), R2 (object storage),
  and KV (edge key-value store).

  Earn 25% recurring commission for 12 months on referred paid plans. Cloudflare's free tier
  is widely adopted, and many users eventually upgrade for advanced security, analytics, and
  performance features — making the referral funnel long but reliable.

short_description: "Global network platform for security, performance, and reliability"

