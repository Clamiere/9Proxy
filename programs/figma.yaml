description: >
  Figma is the collaborative interface design tool used by product teams around the world.
  It runs in the browser with real-time multiplayer, supports prototyping, design systems,
  FigJam whiteboarding, and Dev Mode for handoff to engineers.

  Figma's referral program rewards referrers with account credits rather than cash commissions.
  When a referred user upgrades to a paid plan, both parties receive credits applied to
  their Figma subscription. Best suited for design community influencers, educators, and
  content creators whose audiences are actively evaluating design tools.

short_description: "Collaborative interface design tool for product teams"

