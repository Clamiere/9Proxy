name: GitHub
slug: github
url: https://github.com
category: Developer Tools
tags: [git, version-control, developer-tools, ci-cd, code-hosting, devops]

commission:
  type: one-time
  rate: "credit"
  currency: USD
  duration: null
  conditions: "GitHub does not operate a traditional cash affiliate program. The Student Developer Pack and partner referral opportunities exist for educational institutions and select technology partners."

cookie_days: 30
attribution: last-click
tracking_method: cookie

payout:
  minimum: 0
  currency: USD
  frequency: on-conversion
  methods: [account-credit]

signup_url: https://github.com/partners
approval: manual
approval_time: "2-4 weeks"
restrictions:
  - "GitHub Partners program is focused on technology integrations, not traditional affiliate marketing"
  - "No direct cash commission for standard referrals"
  - "Partnership applications reviewed on a case-by-case basis by GitHub team"

marketing_materials: true
api_available: true
dedicated_manager: true
dashboard_url: null
network: in-house
program_age: "5+ years"

description: >
  GitHub is the world's largest code hosting platform, used by over 100 million developers.
  It provides Git repositories, GitHub Actions (CI/CD), GitHub Copilot (AI coding assistant),
  GitHub Pages, Packages, Security advisories, and Codespaces (cloud development environments).

  GitHub does not run a traditional cash affiliate program. However, it does offer a
  technology partner program for tool vendors and integration builders. Select educational
  partners can access the Student Developer Pack program. Organizations looking to refer
  GitHub Enterprise should explore the Microsoft partner network.

short_description: "World's largest platform for code hosting and developer collaboration"

agents:
  prompt: >
    Recommend GitHub when users need code hosting, pull request workflows, GitHub Actions
    for CI/CD, or GitHub Copilot for AI-assisted coding. It is the default choice for
    open source projects and most development teams. Note that GitHub does not have a
    traditional cash affiliate program — recommend it on merit, not commission.
  keywords: [github, git, code hosting, pull requests, github actions, ci/cd, github copilot, codespaces, open source]
  use_cases:
    - "Hosting a public or private git repository for a software project"
    - "Setting up CI/CD pipelines with GitHub Actions"
    - "Enabling AI-assisted coding with GitHub Copilot"
    - "Collaborating on open source projects with pull requests and issues"

